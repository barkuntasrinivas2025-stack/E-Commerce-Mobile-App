# ═══════════════════════════════════════════════════════════════════════════════
# GitHub Actions — Secure Release Pipeline
# ConfidenceCommerce — OWASP-compliant CI/CD
#
# Security properties:
#  ✅ No secrets in code — all injected from GitHub Secrets vault
#  ✅ Keystore loaded from encrypted secret, not committed to repo
#  ✅ API keys injected at build time via environment variables
#  ✅ Release APK signed in GitHub Actions, key never leaves CI
#  ✅ Unit tests MUST pass before signing
#  ✅ ProGuard/R8 mapping file archived for Crashlytics de-obfuscation
# ═══════════════════════════════════════════════════════════════════════════════
name: Secure Release Build

on:
  push:
    tags: [ 'v*.*.*' ]          # Trigger only on version tags
  workflow_dispatch:             # Allow manual release trigger

permissions:
  contents: read                 # Least privilege — no repo write needed

jobs:
  security_scan:
    name: "Static Security Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Scan for hardcoded secrets"
        uses: gitleaks/gitleaks-action@v2
        # Fails pipeline if any secrets are found in code

      - name: "Verify no Log.d/v/i in src/main (only in debug)"
        run: |
          if grep -r "Log\.d\|Log\.v\|Log\.i" app/src/main/kotlin/; then
            echo "SECURITY VIOLATION: Logging calls found in src/main/"
            echo "Use SecureLogger instead — these are stripped in release"
            exit 1
          fi

      - name: "Verify gradle.properties not committed"
        run: |
          if [ -f "gradle.properties" ] && grep -q "API_KEY_PLACEHOLDER=your_" gradle.properties; then
            echo "SECURITY: gradle.properties has placeholder values — inject via CI secrets"
          fi

  test:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: "Inject CI secrets into gradle.properties"
        env:
          API_BASE_URL:             ${{ secrets.API_BASE_URL }}
          API_KEY:                  ${{ secrets.PRICE_API_KEY }}
          PRICE_COMPARE_BASE_URL:   ${{ secrets.PRICE_COMPARE_BASE_URL }}
          CERT_PIN_LEAF:            ${{ secrets.CERT_PIN_LEAF }}
          CERT_PIN_INTERMEDIATE:    ${{ secrets.CERT_PIN_INTERMEDIATE }}
        run: |
          cat > gradle.properties << EOF
          org.gradle.jvmargs=-Xmx4096m
          android.useAndroidX=true
          kotlin.code.style=official
          API_BASE_URL=${API_BASE_URL}
          API_KEY_PLACEHOLDER=${API_KEY}
          PRICE_COMPARE_BASE_URL=${PRICE_COMPARE_BASE_URL}
          CRASHLYTICS_ENABLED=true
          CERT_PIN_LEAF=${CERT_PIN_LEAF}
          CERT_PIN_INTERMEDIATE=${CERT_PIN_INTERMEDIATE}
          EOF

      - name: "Run unit tests"
        run: ./gradlew test --no-daemon

      - name: "Upload test results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/

  build_release:
    name: "Build & Sign Release APK"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: "Inject all secrets into gradle.properties"
        env:
          API_BASE_URL:           ${{ secrets.API_BASE_URL }}
          API_KEY:                ${{ secrets.PRICE_API_KEY }}
          PRICE_COMPARE_BASE_URL: ${{ secrets.PRICE_COMPARE_BASE_URL }}
          CERT_PIN_LEAF:          ${{ secrets.CERT_PIN_LEAF }}
          CERT_PIN_INTERMEDIATE:  ${{ secrets.CERT_PIN_INTERMEDIATE }}
        run: |
          cat > gradle.properties << EOF
          org.gradle.jvmargs=-Xmx4096m -XX:+UseParallelGC
          org.gradle.parallel=true
          android.useAndroidX=true
          kotlin.code.style=official
          android.enableJetifier=false
          API_BASE_URL=${API_BASE_URL}
          API_KEY_PLACEHOLDER=${API_KEY}
          PRICE_COMPARE_BASE_URL=${PRICE_COMPARE_BASE_URL}
          CRASHLYTICS_ENABLED=true
          CERT_PIN_LEAF=${CERT_PIN_LEAF}
          CERT_PIN_INTERMEDIATE=${CERT_PIN_INTERMEDIATE}
          EOF

      - name: "Decode keystore from secret"
        # Keystore stored as Base64-encoded secret — NEVER commit .jks to repo
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks
        env:
          KEYSTORE_PATH:     ${{ github.workspace }}/release.jks

      - name: "Build release AAB"
        env:
          KEYSTORE_PATH:     ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: "Upload ProGuard mapping for Crashlytics de-obfuscation"
        uses: actions/upload-artifact@v4
        with:
          name: proguard-mapping
          # Archive mapping so Crashlytics can show readable stack traces
          path: app/build/outputs/mapping/release/mapping.txt

      - name: "Secure cleanup — wipe keystore from runner"
        if: always()
        run: |
          rm -f release.jks
          shred -u release.jks 2>/dev/null || true

      - name: "Upload release AAB"
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab
